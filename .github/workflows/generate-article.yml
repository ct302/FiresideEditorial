name: Generate Daily Article

on:
  schedule:
    # Runs at 8 AM UTC every day (3 AM EST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate article
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'stepfun/step-3.5-flash:free' }}
          AMAZON_TAG: ${{ vars.AMAZON_TAG || 'YOUR-TAG-20' }}
        run: python scripts/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "Fireside Bot"
          git config user.email "bot@firesideeditorial.com"
          git add wwwroot/data/articles/ wwwroot/data/content.json
          # Only commit if there are changes
          git diff --cached --quiet || (
            git commit -m "Auto: new article $(date +%Y-%m-%d)" &&
            git push
          )
